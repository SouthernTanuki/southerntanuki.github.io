<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Name | Link in Bio</title>
    
    <!-- SEO & Meta -->
    <meta name="description" content="Your short bio or tagline goes here.">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourdomain.com/">
    <meta property="og:site_name" content="Your Name">
    <meta property="og:title" content="Your Name | Link in Bio">
    <meta property="og:description" content="Your short bio or tagline goes here.">
    <meta property="og:image" content="./assets/profile.jpg">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Your Name | Link in Bio">
    <meta name="twitter:description" content="Your short bio or tagline goes here.">
    <meta name="twitter:image" content="./assets/profile.jpg">

    <!-- Theme Color (Matches your primary color) -->
    <meta name="theme-color" content="#667eea">

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- Favicon (Add your own icons to assets folder) -->
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">

    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container">
        <div class="profile-section">
            <div class="profile-image">
                <!-- REPLACE: Put your image in assets/profile.jpg -->
                <img src="./assets/profile.jpg" alt="Profile Picture" class="profile-img">
            </div>
            <!-- REPLACE: Your Name -->
            <h1 class="profile-name">Your Name</h1>
            <!-- REPLACE: Your Bio -->
            <p class="profile-bio">Your short bio or tagline goes here.</p>
        </div>
        
        <!-- Links (e.g., X, bluesky, etc.) -->
        <div class="links-section">
            <div class="social-links">
                <!-- Custom Link (e.g., ArtStation, Ko-fi, etc.) -->
                <a href="https://example.com" class="social-link" target="_blank" rel="noopener noreferrer">
                    <div class="social-name"><i class="fa-solid fa-palette"></i> Portfolio</div>
                    <i class="fa-solid fa-arrow-right social-arrow"></i>
                </a>
                
                <!-- Custom Link (e.g., ArtStation, Ko-fi, etc.) -->
                <a href="https://example.com" class="social-link" target="_blank" rel="noopener noreferrer">
                    <div class="social-name"><i class="fa-solid fa-palette"></i> Portfolio</div>
                    <i class="fa-solid fa-arrow-right social-arrow"></i>
                </a>

                <!-- Custom Link (e.g., ArtStation, Ko-fi, etc.) -->
                <a href="https://example.com" class="social-link" target="_blank" rel="noopener noreferrer">
                    <div class="social-name"><i class="fa-solid fa-palette"></i> Portfolio</div>
                    <i class="fa-solid fa-arrow-right social-arrow"></i>
                </a>

                <!-- Custom Link (e.g., ArtStation, Ko-fi, etc.) -->
                <a href="https://example.com" class="social-link" target="_blank" rel="noopener noreferrer">
                    <div class="social-name"><i class="fa-solid fa-palette"></i> Portfolio</div>
                    <i class="fa-solid fa-arrow-right social-arrow"></i>
                </a>

                <!-- Custom Link (e.g., ArtStation, Ko-fi, etc.) -->
                <a href="https://example.com" class="social-link" target="_blank" rel="noopener noreferrer">
                    <div class="social-name"><i class="fa-solid fa-palette"></i> Portfolio</div>
                    <i class="fa-solid fa-arrow-right social-arrow"></i>
                </a>


                <!-- REPLACE: Set your email address in the data-email attribute below -->
                <button class="social-link email-trigger" id="emailTrigger">
                    <div class="social-name"><i class="fa-solid fa-envelope"></i> Email</div>
                    <i class="fa-solid fa-arrow-right social-arrow"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="emailModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Email Address Copied!</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body">
                <p class="modal-note">Paste it into your email client and say hi!</p>
            </div>
            <button class="modal-btn" id="modalBtn">Got it</button>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
